<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        let signal = prompt("Enter traffic light color (red, green, yellow)");

        signal = signal.toLowerCase();

        if(signal === "red" ){
            document.write('Please stop');
        }
        else if(signal === "green"){
            document.write("Redy for Go");
        }
        else if(signal === "yellow"){
            document.write('Now you can go');
        }
        else{
            document.write('Plesae add valide value');
        }
    </script>
</body>

</html>
